<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>便利貼後台管理</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="admin">
    <section class="card">
      <h1>便利貼後台管理</h1>
      <p>可新增便利貼內容，並於展後匯出完整文字紀錄。</p>
    </section>

    <section class="card">
      <div class="row">
        <button id="createBtn" type="button">新增</button>
        <button id="clearBtn" type="button" style="background: #e53935;">清空所有留言</button>
        <button id="exportBtn" class="button-link" type="button" style="border:none; cursor:pointer;">匯出文字檔</button>
        <a class="button-link" href="./index.html" target="_blank" rel="noreferrer">開啟投影牆</a>
      </div>
      <div id="status" class="status" aria-live="polite"></div>
    </section>

    <section class="card">
      <h2>目前資料</h2>
      <ul id="notesList" class="notes-list"></ul>
    </section>
  </main>

  <script src="./admin.js"></script>
</body>

</html>
